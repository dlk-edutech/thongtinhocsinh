<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SỞ GD & ĐT ĐẮK LẮK - TRƯỜNG THPT SỐ 1 TRẦN PHÚ</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            min-height: 95vh;
            position: relative;
        }
        .khung-top-right {
            text-align: right;
            margin-bottom: 10px;
        }
        .phan-tieu-de {
            text-align: center;
            margin-bottom: 20px;
        }
        .phan-tieu-de h2 {
            margin: 5px 0;
            color: #333;
        }
        .phan-tieu-de h3 {
            margin: 10px 0 0 0;
            color: #007bff;
        }
        .khung-dieukhien {
            background-color: #fff;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .nut-phu {
            background-color: #6c757d;
        }
        .nut-phu:hover {
            background-color: #5a6268;
        }
        .nut-thanh-cong {
            background-color: #28a745;
        }
        .nut-thanh-cong:hover {
            background-color: #218838;
        }
        .nut-canh-bao {
            background-color: #dc3545;
        }
        .nut-canh-bao:hover {
            background-color: #c82333;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .oLoc {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .noi-dung-chinh {
            flex: 1;
        }
        .phan-ban-quyen {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #ddd;
        }
        /* CSS cho chuc nang sua */
        .o-da-sua {
            background-color: #fff3cd !important;
            color: #856404;
            font-weight: bold;
        }
        .lop-phu {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .khung-modal {
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            z-index: 1000; 
            max-height: 85vh; 
            overflow-y: auto;
            min-width: 350px;
        }
        .nhap-sua {
            width: 100%; 
            padding: 8px; 
            margin-top: 5px; 
            margin-bottom: 15px; 
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="khung-top-right">
        <button id="nutSuaDuLieu" class="nut-thanh-cong">Sửa dữ liệu</button>
        <button id="nutDangNhap" class="nut-phu">Đăng nhập quản lý</button>
    </div>

    <div class="phan-tieu-de">
        <h2 id="tieuDe1">SỞ GD & ĐT ĐẮK LẮK</h2>
        <h2 id="tieuDe2">TRƯỜNG THPT SỐ 1 TRẦN PHÚ</h2>
        <h3 id="tieuDe3">Hệ Thống Tìm Kiếm Thông Tin Học Sinh</h3>
    </div>

    <div class="noi-dung-chinh">
        <div id="khungQuanLy" class="khung-dieukhien" style="display: none;">
            <input type="file" id="fileNhap" accept=".xlsx, .xls">
            <button id="nutTaiLen">Nạp dữ liệu Excel</button>
            <button id="nutDoiTieuDe" class="nut-phu">Đổi tiêu đề</button>
            <button id="nutDoiMatKhau" class="nut-phu">Đổi mật khẩu</button>
            <button id="nutMoTatSua" class="nut-phu">Mở/Tắt quyền sửa</button>
            <span id="trangThai" style="margin-left: 10px; color: green; font-weight: bold;"></span>
        </div>

        <div id="khungBang"></div>
    </div>

    <div id="lopPhuModal" class="lop-phu"></div>
    <div id="khungSuaDuLieu" class="khung-modal">
        <h3 style="margin-top:0; color:#007bff; border-bottom: 2px solid #eee; padding-bottom: 10px;">Sửa thông tin</h3>
        <div id="noiDungSua"></div>
        <div style="text-align: right; margin-top: 15px;">
            <button id="nutLuuSua" class="nut-thanh-cong">Lưu thay đổi</button>
            <button id="nutDongSua" class="nut-phu">Hủy</button>
        </div>
    </div>

    <div class="phan-ban-quyen">
        Bản quyền: Dlk Edu Tech - Phát triển bởi tranhongdan@tranphudlk.edu.vn
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyASafVpSGkoJbAY9xe0Q09gUmtUL2J7NI8",
            authDomain: "stdin4.firebaseapp.com",
            databaseURL: "https://stdin4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "stdin4",
            storageBucket: "stdin4.firebasestorage.app",
            messagingSenderId: "826465045747",
            appId: "1:826465045747:web:c97a57537290a427dc7b86"
        };

        const ungDung = initializeApp(firebaseConfig);
        const coSoDuLieu = getDatabase(ungDung);
        const duongDanDuLieu = ref(coSoDuLieu, 'danh_sach_hoc_sinh');
        const duongDanMatKhau = ref(coSoDuLieu, 'mat_khau_admin');
        const duongDanTieuDe = ref(coSoDuLieu, 'tieu_de_trang');
        const duongDanChoPhepSua = ref(coSoDuLieu, 'cho_phep_sua');

        let duLieuGoc = [];
        let cacCotHienThi = [];
        let cotAn = "";
        let matKhauHienTai = "admin";
        let trangThaiDangNhap = false;
        let choPhepSuaHienTai = false;
        let duLieuHangDangSua = null;
        
        // Tiêu đề mặc định nếu trên Firebase chưa có
        let duLieuTieuDe = {
            dong1: "SỞ GD & ĐT ĐẮK LẮK",
            dong2: "TRƯỜNG THPT SỐ 1 TRẦN PHÚ",
            dong3: "Hệ Thống Tìm Kiếm Thông Tin Học Sinh"
        };

        const fileNhap = document.getElementById('fileNhap');
        const nutTaiLen = document.getElementById('nutTaiLen');
        const nutDoiMatKhau = document.getElementById('nutDoiMatKhau');
        const nutDangNhap = document.getElementById('nutDangNhap');
        const nutDoiTieuDe = document.getElementById('nutDoiTieuDe');
        const khungQuanLy = document.getElementById('khungQuanLy');
        const khungBang = document.getElementById('khungBang');
        const trangThai = document.getElementById('trangThai');
        const tieuDe1 = document.getElementById('tieuDe1');
        const tieuDe2 = document.getElementById('tieuDe2');
        const tieuDe3 = document.getElementById('tieuDe3');
        const nutMoTatSua = document.getElementById('nutMoTatSua');
        const nutSuaDuLieu = document.getElementById('nutSuaDuLieu');

        // Lắng nghe dữ liệu mật khẩu
        onValue(duongDanMatKhau, (snapshot) => {
            if (snapshot.exists()) {
                matKhauHienTai = snapshot.val();
            }
        });

        // Lắng nghe dữ liệu quyền sửa
        onValue(duongDanChoPhepSua, (snapshot) => {
            if (snapshot.exists()) {
                choPhepSuaHienTai = snapshot.val();
            } else {
                choPhepSuaHienTai = false;
            }
            capNhatGiaoDienQuyenSua();
        });

        function capNhatGiaoDienQuyenSua() {
            if (choPhepSuaHienTai) {
                nutMoTatSua.textContent = "Khóa quyền sửa";
                nutMoTatSua.className = "nut-canh-bao";
                nutSuaDuLieu.style.display = "inline-block";
            } else {
                nutMoTatSua.textContent = "Mở quyền sửa";
                nutMoTatSua.className = "nut-thanh-cong";
                nutSuaDuLieu.style.display = "none";
            }
        }

        // Lắng nghe dữ liệu tiêu đề
        onValue(duongDanTieuDe, (snapshot) => {
            if (snapshot.exists()) {
                duLieuTieuDe = snapshot.val();
                tieuDe1.textContent = duLieuTieuDe.dong1;
                tieuDe2.textContent = duLieuTieuDe.dong2;
                tieuDe3.textContent = duLieuTieuDe.dong3;
                document.title = duLieuTieuDe.dong1 + " - " + duLieuTieuDe.dong2;
            }
        });

        // Xử lý đăng nhập / đăng xuất
        nutDangNhap.addEventListener('click', () => {
            if (!trangThaiDangNhap) {
                const nhapMk = prompt("Vui lòng nhập mật khẩu quản lý:");
                if (nhapMk === matKhauHienTai) {
                    trangThaiDangNhap = true;
                    khungQuanLy.style.display = "block";
                    nutDangNhap.textContent = "Đăng xuất";
                } else if (nhapMk !== null) {
                    alert("Sai mật khẩu!");
                }
            } else {
                trangThaiDangNhap = false;
                khungQuanLy.style.display = "none";
                nutDangNhap.textContent = "Đăng nhập quản lý";
            }
        });

        // Đóng mở quyền sửa cho Admin
        nutMoTatSua.addEventListener('click', () => {
            set(duongDanChoPhepSua, !choPhepSuaHienTai)
                .then(() => alert(!choPhepSuaHienTai ? "Đã mở chức năng sửa dữ liệu cho học sinh!" : "Đã khóa chức năng sửa dữ liệu!"))
                .catch((loi) => console.error(loi));
        });

        // Xử lý đổi tiêu đề
        nutDoiTieuDe.addEventListener('click', () => {
            const d1 = prompt("Nhập tiêu đề dòng 1:", duLieuTieuDe.dong1);
            if (d1 === null) return;
            const d2 = prompt("Nhập tiêu đề dòng 2:", duLieuTieuDe.dong2);
            if (d2 === null) return;
            const d3 = prompt("Nhập tiêu đề dòng 3:", duLieuTieuDe.dong3);
            if (d3 === null) return;

            set(duongDanTieuDe, { dong1: d1, dong2: d2, dong3: d3 })
                .then(() => alert("Cập nhật tiêu đề thành công!"))
                .catch((loi) => {
                    alert("Lỗi khi lưu tiêu đề!");
                    console.error(loi);
                });
        });

        // Xử lý đổi mật khẩu
        nutDoiMatKhau.addEventListener('click', () => {
            const nhapMatKhauCu = prompt("Vui lòng xác nhận lại mật khẩu hiện tại:");
            if (nhapMatKhauCu === null) return;

            if (nhapMatKhauCu !== matKhauHienTai) {
                alert("Mật khẩu hiện tại không đúng!");
                return;
            }

            const matKhauMoi = prompt("Nhập mật khẩu mới:");
            if (matKhauMoi === null || matKhauMoi.trim() === "") {
                alert("Mật khẩu mới không hợp lệ!");
                return;
            }

            set(duongDanMatKhau, matKhauMoi)
                .then(() => alert("Đổi mật khẩu thành công!"))
                .catch((loi) => {
                    alert("Lỗi khi lưu mật khẩu mới!");
                    console.error(loi);
                });
        });

        // Xử lý nạp file Excel
        nutTaiLen.addEventListener('click', () => {
            const file = fileNhap.files[0];
            if (!file) {
                alert("Vui lòng chọn file Excel trước khi nạp!");
                return;
            }

            trangThai.textContent = "Đang xử lý...";
            const boDoc = new FileReader();
            
            boDoc.onload = (e) => {
                const duLieu = new Uint8Array(e.target.result);
                const bangTinh = XLSX.read(duLieu, { type: 'array' });
                const tenTrangDau = bangTinh.SheetNames[0];
                const trangDuLieu = bangTinh.Sheets[tenTrangDau];
                
                const mangHaiChieu = XLSX.utils.sheet_to_json(trangDuLieu, { header: 1 });
                let thuTuCot = [];
                if (mangHaiChieu.length > 0) {
                    thuTuCot = mangHaiChieu[0].filter(cot => cot !== undefined && cot !== null && String(cot).trim() !== "");
                }

                const jsonDuLieu = XLSX.utils.sheet_to_json(trangDuLieu, { defval: "" });

                if (jsonDuLieu.length > 0) {
                    const duLieuDayLen = {
                        thuTu: thuTuCot,
                        danhSach: jsonDuLieu
                    };

                    set(duongDanDuLieu, duLieuDayLen)
                        .then(() => {
                            trangThai.textContent = "Nạp dữ liệu thành công!";
                            fileNhap.value = ""; 
                            setTimeout(() => { trangThai.textContent = ""; }, 3000);
                        })
                        .catch((loi) => {
                            trangThai.textContent = "Lỗi nạp dữ liệu!";
                            console.error(loi);
                        });
                } else {
                    trangThai.textContent = "File Excel không có dữ liệu.";
                }
            };
            boDoc.readAsArrayBuffer(file);
        });

        // Lắng nghe dữ liệu học sinh
        onValue(duongDanDuLieu, (snapshot) => {
            const duLieuNhan = snapshot.val();
            
            if (duLieuNhan && duLieuNhan.danhSach && duLieuNhan.danhSach.length > 0) {
                duLieuGoc = [];
                // Giu nguyen vi tri index de cap nhat len Firebase chinh xac
                duLieuNhan.danhSach.forEach((hang, viTri) => {
                    if (hang !== null) {
                        hang._viTriGoc = viTri;
                        duLieuGoc.push(hang);
                    }
                });
                
                if (duLieuGoc.length > 0) {
                    const tatCaCot = duLieuNhan.thuTu || Object.keys(duLieuGoc[0]).filter(k => k !== "_viTriGoc" && k !== "_daSua");
                    
                    if (tatCaCot.length > 0) {
                        cotAn = tatCaCot[0]; // Cot 1 la cot an (CCCD)
                        
                        // Cac cot tu cot 2 tro di de hien thi
                        cacCotHienThi = tatCaCot.slice(1).filter(cot => {
                            return duLieuGoc.some(hang => hang[cot] !== undefined && hang[cot] !== null && String(hang[cot]).trim() !== "");
                        });
                    }

                    taoKhungBang();
                    capNhatThanBang([], true);
                }
            } else {
                khungBang.innerHTML = "<p>Chưa có dữ liệu trên hệ thống. Vui lòng nạp từ file Excel.</p>";
            }
        });

        function taoKhungBang() {
            let html = '<table><thead><tr>';
            
            cacCotHienThi.forEach(cot => {
                html += `<th>${cot}</th>`;
            });
            html += '</tr><tr>';
            
            cacCotHienThi.forEach(cot => {
                html += `<th><input type="text" class="oLoc" data-cot="${cot}" placeholder="Lọc..."></th>`;
            });
            html += '</tr></thead><tbody id="thanBang"></tbody></table>';
            
            khungBang.innerHTML = html;

            const cacOLoc = document.querySelectorAll('.oLoc');
            cacOLoc.forEach(oNhap => {
                oNhap.addEventListener('input', locDuLieu);
            });
        }

        function capNhatThanBang(duLieuHienThi, chuaCoDieuKien = false) {
            const thanBang = document.getElementById('thanBang');
            if (!thanBang) return;

            if (chuaCoDieuKien) {
                thanBang.innerHTML = `<tr><td colspan="${cacCotHienThi.length}" style="text-align:center; color: #555; font-style: italic;">Vui lòng nhập thông tin vào ít nhất 1 ô lọc để xem dữ liệu.</td></tr>`;
                return;
            }

            if (!duLieuHienThi || duLieuHienThi.length === 0) {
                thanBang.innerHTML = `<tr><td colspan="${cacCotHienThi.length}" style="text-align:center; color: red;">Không tìm thấy dữ liệu phù hợp.</td></tr>`;
                return;
            }

            let html = '';
            duLieuHienThi.forEach(hang => {
                html += '<tr>';
                cacCotHienThi.forEach(cot => {
                    const giaTri = hang[cot] !== undefined ? hang[cot] : '';
                    const lopHighlight = (hang._daSua && hang._daSua.includes(cot)) ? ' class="o-da-sua"' : '';
                    html += `<td${lopHighlight}>${giaTri}</td>`;
                });
                html += '</tr>';
            });
            thanBang.innerHTML = html;
        }

        function locDuLieu() {
            const cacOLoc = document.querySelectorAll('.oLoc');
            let dieuKien = {};
            let coDieuKien = false;

            cacOLoc.forEach(oNhap => {
                const giaTri = oNhap.value.trim().toLowerCase();
                if (giaTri) {
                    dieuKien[oNhap.dataset.cot] = giaTri;
                    coDieuKien = true;
                }
            });

            if (!coDieuKien) {
                capNhatThanBang([], true);
                return;
            }

            const duLieuDaLoc = duLieuGoc.filter(hang => {
                for (let cot in dieuKien) {
                    const giaTriHang = hang[cot] ? String(hang[cot]).toLowerCase() : "";
                    if (!giaTriHang.includes(dieuKien[cot])) {
                        return false; 
                    }
                }
                return true;
            });

            capNhatThanBang(duLieuDaLoc, false);
        }

        // --- XU LY CHUC NANG SUA DU LIEU ---
        
        nutSuaDuLieu.addEventListener('click', () => {
            if (!choPhepSuaHienTai) {
                alert("Chức năng sửa dữ liệu hiện đang bị khóa!");
                return;
            }

            const cccd = prompt(`Vui lòng nhập thông tin đối chiếu (${cotAn}):`);
            if (!cccd || cccd.trim() === "") return;

            // Tim hang du lieu khop voi cotAn
            const hangTimDuoc = duLieuGoc.find(hang => hang[cotAn] !== undefined && String(hang[cotAn]).trim() === cccd.trim());
            
            if (!hangTimDuoc) {
                alert("Thông tin đối chiếu không chính xác hoặc không tồn tại trong hệ thống!");
                return;
            }

            // Copy du lieu sang bien tam de sua
            duLieuHangDangSua = JSON.parse(JSON.stringify(hangTimDuoc));

            let htmlSua = '';
            cacCotHienThi.forEach(cot => {
                htmlSua += `
                    <label style="font-weight: bold; display: block;">${cot}</label>
                    <input type="text" id="inputSua_${cot}" class="nhap-sua" value="${duLieuHangDangSua[cot] !== undefined ? duLieuHangDangSua[cot] : ''}">
                `;
            });

            document.getElementById('noiDungSua').innerHTML = htmlSua;
            document.getElementById('lopPhuModal').style.display = 'block';
            document.getElementById('khungSuaDuLieu').style.display = 'block';
        });

        // Tat Form sua
        document.getElementById('nutDongSua').addEventListener('click', () => {
            document.getElementById('lopPhuModal').style.display = 'none';
            document.getElementById('khungSuaDuLieu').style.display = 'none';
        });

        // Luu lai sau khi sua
        document.getElementById('nutLuuSua').addEventListener('click', () => {
            if (!duLieuHangDangSua) return;

            let coThayDoi = false;
            if (!duLieuHangDangSua._daSua) {
                duLieuHangDangSua._daSua = [];
            }

            // So sanh tung o de tim ra o bi thay doi
            cacCotHienThi.forEach(cot => {
                const giaTriMoi = document.getElementById(`inputSua_${cot}`).value;
                const giaTriCu = duLieuHangDangSua[cot] !== undefined ? String(duLieuHangDangSua[cot]) : "";
                
                if (giaTriMoi !== giaTriCu) {
                    duLieuHangDangSua[cot] = giaTriMoi;
                    if (!duLieuHangDangSua._daSua.includes(cot)) {
                        duLieuHangDangSua._daSua.push(cot);
                    }
                    coThayDoi = true;
                }
            });

            if (coThayDoi) {
                const viTriGoc = duLieuHangDangSua._viTriGoc;
                const banSaoDayLen = { ...duLieuHangDangSua };
                delete banSaoDayLen._viTriGoc; // Xoa bien tam truoc khi day len Firebase
                
                const duongDanHang = ref(coSoDuLieu, `danh_sach_hoc_sinh/danhSach/${viTriGoc}`);
                set(duongDanHang, banSaoDayLen)
                    .then(() => {
                        alert("Đã cập nhật thông tin thành công!");
                        document.getElementById('lopPhuModal').style.display = 'none';
                        document.getElementById('khungSuaDuLieu').style.display = 'none';
                    })
                    .catch((loi) => {
                        alert("Lỗi khi lưu dữ liệu lên hệ thống!");
                        console.error(loi);
                    });
            } else {
                alert("Không có thông tin nào được thay đổi.");
                document.getElementById('lopPhuModal').style.display = 'none';
                document.getElementById('khungSuaDuLieu').style.display = 'none';
            }
        });

    </script>
</body>
</html>
